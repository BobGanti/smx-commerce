<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>{{ commerce_config.host_site_title }} · Support</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  {% if commerce_config.favicon_url %}
    <link rel="icon" href="{{ commerce_config.favicon_url }}">
  {% endif %}
  <link rel="stylesheet" href="/commerce/static/smx-commerce.css">
</head>
<body>
  <main>
    <header class="smx-site-header">
      <a class="smx-site-brand" href="/commerce">
        {% if commerce_config.logo_url %}
          <img src="{{ commerce_config.logo_url }}" alt="{{ commerce_config.host_site_title }} logo">
        {% endif %}
        <span class="smx-site-brand-title">{{ commerce_config.store_title }}</span>
      </a>

      <nav class="smx-nav" aria-label="Commerce navigation">
        <a href="{{ commerce_config.host_home_url }}">Back to {{ commerce_config.host_site_title }}</a>
        <a href="/commerce">Commerce home</a>
        <a href="/commerce/products">Products</a>
        <a href="/commerce/cart">Cart</a>
        <a href="/commerce/customer/account">Account</a>
        <a href="/commerce/support">Support</a>
      </nav>
    </header>

    <section class="smx-panel">
      <h1>Customer support</h1>
      <p class="smx-muted">Send a support request to {{ commerce_config.store_title }}.</p>

      <form method="post" action="/commerce/support/submit" class="smx-form">
        <label>
          Name
          <input type="text" name="customer_name">
        </label>

        <label>
          Email
          <input type="email" name="customer_email" required>
        </label>

        <label>
          Order reference
          <input type="text" name="order_public_id" placeholder="Optional">
        </label>

        <label>
          Subject
          <input type="text" name="subject" required>
        </label>

        <label>
          Message
          <textarea name="message" rows="8" required></textarea>
        </label>

        <button type="submit">Submit support request</button>
      </form>
    </section>
  </main>
</body>
</html>
